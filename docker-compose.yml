version: '3.9'

# Local development fallback — use kind + skaffold as primary dev env.
# This exists for quick iteration without a cluster.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: billguard
      POSTGRES_USER: billguard
      POSTGRES_PASSWORD: billguard_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billguard -d billguard"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    env_file:
      - ./backend/.env
    build:
      context: ./backend
      target: build        # Use build stage for hot reload in dev
    command: npm run dev
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://billguard:billguard_dev@postgres:5432/billguard
      LOG_LEVEL: debug
    ports:
      - "3001:3001"
    volumes:
      - ./backend/src:/app/src:ro  # Hot reload
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
