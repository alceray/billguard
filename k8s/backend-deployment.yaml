apiVersion: apps/v1
kind: Deployment
metadata:
  name: billguard-backend
  namespace: billguard-dev
  labels:
    app.kubernetes.io/name: billguard-backend
    app.kubernetes.io/component: api
    app.kubernetes.io/version: "0.1.0"
  annotations:
    # Populated by CI on deploy
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: billguard-backend
  # CKAD: rolling update — never take all pods down at once
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: billguard-backend
        app.kubernetes.io/name: billguard-backend
    spec:
      # CKAD: initContainer — wait for DB before starting the API server
      # Prevents "connection refused" errors during rolling deploys
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service 5432; do
                echo "Waiting for postgres..."; sleep 2;
              done
              echo "Postgres is ready"
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"

      containers:
        - name: api
          image: billguard-backend:latest   # replaced by CI with ECR digest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001

          # CKAD: envFrom ConfigMap + Secret — clean separation of config vs secrets
          envFrom:
            - configMapRef:
                name: billguard-config
            - secretRef:
                name: billguard-secrets

          # CKAD: resource requests/limits — prevents noisy-neighbour issues
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # CKAD: liveness probe — restart pod if API becomes unresponsive
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5

          # CKAD: readiness probe — only route traffic when DB connection is verified
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5

          # CKAD: startup probe — gives the app time to do initial setup before liveness kicks in
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 12
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: billguard-backend-service
  namespace: billguard-dev
  labels:
    app.kubernetes.io/name: billguard-backend
    app.kubernetes.io/component: api
spec:
  selector:
    app: billguard-backend
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
