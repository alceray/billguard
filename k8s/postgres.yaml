# In-cluster Postgres for local kind development.
# Production uses RDS — this manifest is dev-only.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: billguard-dev
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/name: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: billguard
            - name: POSTGRES_USER
              value: billguard
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: billguard-secrets
                  key: DATABASE_PASSWORD
          # CKAD: resource requests/limits on every container
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # CKAD: liveness probe — postgres-specific check
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "billguard", "-d", "billguard"]
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          # CKAD: readiness probe — only route traffic when DB is accepting connections
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "billguard", "-d", "billguard"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}  # Non-persistent for dev; use PVC for prod
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: billguard-dev
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
