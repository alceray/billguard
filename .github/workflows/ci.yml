name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  frontend:
    name: Frontend — check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run check

      # VITE_* vars are required at build time — use placeholders for CI
      # Real values are set in .env.local locally and via GitHub secrets in prod
      - run: npm run build
        env:
          VITE_AUTH0_DOMAIN: ci.auth0.com
          VITE_AUTH0_CLIENT_ID: ci-client-id
          VITE_AUTH0_AUDIENCE: https://api.billguard.dev
          VITE_API_URL: http://localhost:3001

